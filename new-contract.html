<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>New Contact - Employee Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="nav" role="navigation" aria-label="Main navigation">
        <a class="brand" href="index.html">
            <div class="logo">EMS</div>
            <div class="brand-text">
                <div class="brand-title">Employee Management System</div>
                <div class="brand-sub">Manage employees & contacts</div>
            </div>
        </a>

        <div class="nav-links" role="menubar">
            <a href="index.html" class="nav-link" role="menuitem">Home</a>
            <a href="new-contact.html" class="nav-link active" role="menuitem">New Contact</a>
            <a href="view-contacts.html" class="nav-link" role="menuitem">View All Contacts</a>
        </div>
    </nav>

    <main class="container">
        <section class="form-card">
            <h2>Add New Contact</h2>
            <form id="contact-form" class="form" autocomplete="off">
                <div class="form-row">
                    <label for="fullName">Full Name</label>
                    <input id="fullName" name="fullName" type="text" required placeholder="e.g., Jane Doe">
                </div>

                <div class="form-row">
                    <label for="email">Email Address</label>
                    <input id="email" name="email" type="email" required placeholder="name@example.com">
                </div>

                <div class="form-row">
                    <label for="phone">Phone Number</label>
                    <input id="phone" name="phone" type="tel" placeholder="+254712345678" required>
                </div>

                <div class="form-row">
                    <label for="department">Department</label>
                    <input id="department" name="department" type="text" placeholder="e.g., Human Resources">
                </div>

                <div class="form-row">
                    <label for="position">Position</label>
                    <input id="position" name="position" type="text" placeholder="e.g., HR Officer">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn primary">Submit</button>
                    <a href="view-contacts.html" class="btn outline">View All Contacts</a>
                </div>

                <div id="form-message" class="muted" aria-live="polite"></div>
            </form>
        </section>
    </main>

    <footer class="footer">
        © <span id="year"></span> Employee Management System
    </footer>

    <script src="main.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();


        const form = document.getElementById('contact-form');
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            const data = {
                id: 'c_' + Date.now(),
                fullName: form.fullName.value.trim(),
                email: form.email.value.trim(),
                phone: form.phone.value.trim(),
                department: form.department.value.trim(),
                position: form.position.value.trim(),
                createdAt: new Date().toISOString()
            };

            const validation = validateContact(data);
            const messageEl = document.getElementById('form-message');

            if (!validation.ok) {
                messageEl.textContent = validation.message;
                messageEl.style.color = '#ffb4b4';
                return;
            }

            addContact(data);
            messageEl.textContent = 'Contact added successfully.';
            messageEl.style.color = '#bfffc9';


            form.reset();


            setTimeout(() => {

                window.location.href = 'view-contacts.html';
            }, 700);
        });
    </script>
</body>

</html>
